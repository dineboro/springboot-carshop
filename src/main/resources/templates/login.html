<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'login')}">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<!-- Success Messages -->
<div th:if="${messageSuccess}" class="alert alert-success" th:text="${messageSuccess}">
  Success message
</div>

<div th:if="${messageDanger}" class="alert alert-danger" th:text="${messageDanger}">
  Error message
</div>

<div th:if="${param.error}" class="alert alert-danger">
  Invalid email or password.
</div>

<div th:if="${param.logout}" class="alert alert-success">
  You have been logged out successfully.
</div>

<!-- Login Form -->
<form th:action="@{/login}" method="post" class="form-horizontal">
  <div class="form-group">
    <label class="col-sm-2 control-label">Email</label>
    <div class="col-sm-10">
      <input type="email"
             name="username"
             class="form-control"
             placeholder="Enter your email"
             required
             autofocus>
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-2 control-label">Password</label>
    <div class="col-sm-10">
      <input type="password"
             name="password"
             class="form-control"
             placeholder="Enter your password"
             required>
    </div>
  </div>

  <div class="form-group">
    <div class="col-sm-offset-2 col-sm-10">
      <button type="submit" class="btn btn-primary">
        <span class="fa fa-sign-in"></span> Login
      </button>
    </div>
  </div>
</form>

<div class="text-center" style="margin-top: 20px;">
  <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>
</div>

</body>
</html>
