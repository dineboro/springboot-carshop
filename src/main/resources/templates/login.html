<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'login')}">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>

<body>

<h2>Login</h2>

<div th:if="${param.error}" class="alert alert-danger">
  Invalid username or password.
</div>

<div th:if="${param.logout}" class="alert alert-success">
  You have been logged out successfully.
</div>

<form th:action="@{/login}" method="post" class="form-horizontal">
  <div class="form-group">
    <label class="col-sm-2 control-label" for="username">Email</label>
    <div class="col-sm-10">
      <input type="text"
             id="username"
             name="username"
             class="form-control"
             placeholder="Enter your email"
             required
             autofocus>
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-2 control-label" for="password">Password</label>
    <div class="col-sm-10">
      <input type="password"
             id="password"
             name="password"
             class="form-control"
             placeholder="Enter your password"
             required>
    </div>
  </div>

  <div class="form-group">
    <div class="col-sm-offset-2 col-sm-10">
      <div class="checkbox">
        <label>
          <input type="checkbox" name="remember-me"> Remember me
        </label>
      </div>
    </div>
  </div>

  <div class="form-group">
    <div class="col-sm-offset-2 col-sm-10">
      <button type="submit" class="btn btn-primary">
        <span class="fa fa-sign-in"></span> Login
      </button>
    </div>
  </div>
</form>

<div class="text-center" style="margin-top: 20px;">
  <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>
  <p><a th:href="@{/forgot-password}">Forgot your password?</a></p>
</div>

</body>
</html>
