<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'communications')}">
<body>

<h2>
  <span class="fa fa-comments"></span>
  <span th:text="${communication.communicationId == null} ? 'Log Communication' : 'Edit Communication'">Form</span>
</h2>

<form th:action="${communication.communicationId == null} ? @{/communications/new} : @{/communications/{id}/edit(id=${communication.communicationId})}"
      th:object="${communication}" method="post">

  <input type="hidden" th:field="*{contactedBy}" />

  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label fw-semibold">Customer <span class="text-danger">*</span></label>
      <select class="form-select" th:field="*{customerId}" required>
        <option value="">-- Select customer --</option>
        <option th:each="c : ${customers}" th:value="${c.customerId}" th:text="${c.customerName}">Customer</option>
      </select>
      <div class="text-danger small mt-1" th:if="${#fields.hasErrors('customerId')}" th:errors="*{customerId}">Error</div>
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label fw-semibold">Related Appointment (optional)</label>
      <select class="form-select" th:field="*{appointmentId}">
        <option value="">-- None --</option>
        <option th:each="a : ${appointments}"
                th:value="${a.appointmentId}"
                th:text="${'#' + a.appointmentId + ' — ' + #temporals.format(a.appointmentDate, 'MMM d, yyyy')}">Appt</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label fw-semibold">Communication Type <span class="text-danger">*</span></label>
      <select class="form-select" th:field="*{communicationType}" required>
        <option value="">-- Select type --</option>
        <option th:each="t : ${commTypes}" th:value="${t}" th:text="${t}">Type</option>
      </select>
      <div class="text-danger small mt-1" th:if="${#fields.hasErrors('communicationType')}" th:errors="*{communicationType}">Error</div>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label fw-semibold">Direction <span class="text-danger">*</span></label>
      <select class="form-select" th:field="*{direction}" required>
        <option value="">-- Select --</option>
        <option th:each="d : ${directions}" th:value="${d}" th:text="${d}">Direction</option>
      </select>
      <div class="text-danger small mt-1" th:if="${#fields.hasErrors('direction')}" th:errors="*{direction}">Error</div>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label fw-semibold">Date/Time</label>
      <input type="datetime-local" class="form-control" th:field="*{communicationDate}" />
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Subject</label>
    <input type="text" class="form-control" th:field="*{subject}" maxlength="256" />
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Notes</label>
    <textarea class="form-control" th:field="*{notes}" rows="4"></textarea>
  </div>

  <div class="row align-items-end">
    <div class="col-md-3 mb-3">
      <div class="form-check mt-4">
        <input class="form-check-input" type="checkbox" th:field="*{followUpRequired}" id="followUpCheck"
               onchange="toggleFollowUpDate(this)" />
        <label class="form-check-label fw-semibold" for="followUpCheck">Follow-up Required</label>
      </div>
    </div>
    <div class="col-md-4 mb-3" id="followUpDateDiv"
         th:style="${communication.followUpRequired} ? '' : 'display:none'">
      <label class="form-label fw-semibold">Follow-up Date</label>
      <input type="datetime-local" class="form-control" th:field="*{followUpDate}" />
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      <span class="fa" th:classappend="${communication.communicationId == null} ? 'fa-plus' : 'fa-save'"></span>
      <span th:text="${communication.communicationId == null} ? 'Log Communication' : 'Save Changes'">Submit</span>
    </button>
    <a href="/communications" class="btn btn-secondary">
      <span class="fa fa-times"></span> Cancel
    </a>
  </div>

</form>

<script>
  function toggleFollowUpDate(checkbox) {
    document.getElementById('followUpDateDiv').style.display = checkbox.checked ? '' : 'none';
  }
</script>

</body>
</html>
