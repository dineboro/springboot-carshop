<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout (~{::body},'admin')}">
<head>
  <meta charset="UTF-8">
  <title>Pending Approvals</title>
</head>
<body>

<h2>Pending User Approvals</h2>

<!-- Success/Error Messages -->
<div th:if="${messageSuccess}" class="alert alert-success" th:text="${messageSuccess}"></div>
<div th:if="${messageError}" class="alert alert-danger" th:text="${messageError}"></div>

<!-- Pending Users Table -->
<div th:if="${pendingUsers == null || pendingUsers.isEmpty()}" class="alert alert-info">
  <strong>No pending approvals!</strong> All users have been processed.
</div>

<table th:if="${pendingUsers != null && !pendingUsers.isEmpty()}" class="table table-striped">
  <thead>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Registered</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="user : ${pendingUsers}">
    <td>
      <span th:text="${user.firstName != null && user.lastName != null ? user.firstName + ' ' + user.lastName : user.email}">John Doe</span>
    </td>
    <td th:text="${user.email}">user@example.com</td>
    <td th:text="${user.phone != null ? user.phone : 'N/A'}">555-1234</td>
    <td>
      <span th:if="${user.createdAt != null}"
            th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 10:00</span>
      <span th:if="${user.createdAt == null}">N/A</span>
    </td>
    <td>
      <!-- Quick Approve with Role Selection -->
      <form th:action="@{/admin/quick-approve/{id}(id=${user.id})}"
            method="post"
            style="display: inline-block;">

        <select name="role" class="form-select form-select-sm" style="width: 150px; display: inline-block;">
          <option value="MANAGER">Manager</option>
          <option value="RECEPTIONIST">Receptionist</option>
          <option value="TECHNICIAN">Technician</option>
        </select>

        <button type="submit" class="btn btn-success btn-sm">
          <span class="fa fa-check"></span> Approve
        </button>
      </form>

      <!-- Reject Button -->
      <form th:action="@{/admin/reject/{id}(id=${user.id})}"
            method="post"
            style="display: inline-block;"
            onsubmit="return confirm('Are you sure you want to reject this user?');">
        <button type="submit" class="btn btn-danger btn-sm">
          <span class="fa fa-times"></span> Reject
        </button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<!-- Back Button -->
<div class="mt-3">
  <a th:href="@{/}" class="btn btn-secondary">
    <span class="fa fa-arrow-left"></span> Back to Home
  </a>
</div>

</body>
</html>
