<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'admin')}">
<body>

<h2>Pending User Approvals</h2>

<!-- Success/Error Messages -->
<div th:if="${messageSuccess}" class="alert alert-success" th:text="${messageSuccess}"></div>
<div th:if="${messageError}" class="alert alert-danger" th:text="${messageError}"></div>

<!-- Pending Users Table -->
<div th:if="${#lists.isEmpty(pendingUsers)}" class="alert alert-info">
  <strong>No pending approvals!</strong> All users have been processed.
</div>

<table th:unless="${#lists.isEmpty(pendingUsers)}" class="table table-striped">
  <thead>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Registered</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="user : ${pendingUsers}">
    <td>
      <span th:text="${user.firstName} + ' ' + ${user.lastName}">John Doe</span>
    </td>
    <td th:text="${user.email}"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="cca6a3a4a28cb8a9bfb8e2afa3a1">[email&#160;protected]</a></td>
    <td th:text="${user.phone != null ? user.phone : 'N/A'}">555-1234</td>
    <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 10:00</td>
    <td>
      <!-- Quick Approve with Role Selection -->
      <form th:action="@{/admin/quick-approve/{id}(id=${user.id})}"
            method="post"
            style="display: inline-block;">

        <select name="role" class="form-select form-select-sm" style="width: 150px; display: inline-block;">
          <option value="MANAGER">Manager</option>
          <option value="RECEPTIONIST">Receptionist</option>
          <option value="TECHNICIAN">Technician</option>
        </select>

        <button type="submit" class="btn btn-success btn-sm">
          <span class="fa fa-check"></span> Approve
        </button>
      </form>

      <!-- Reject Button -->
      <form th:action="@{/admin/reject/{id}(id=${user.id})}"
            method="post"
            style="display: inline-block;"
            onsubmit="return confirm('Are you sure you want to reject this user?');">
        <button type="submit" class="btn btn-danger btn-sm">
          <span class="fa fa-times"></span> Reject
        </button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

  <a th:href="@{/}" class
