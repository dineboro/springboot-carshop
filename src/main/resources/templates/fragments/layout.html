<!DOCTYPE html>

<html th:fragment="layout (template, menu)"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>

<head>

  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/x-icon" th:href="@{/resources/images/favicon.png}">
  <title th:text="#{layoutTitle}">PetClinic :: a Spring Framework demonstration</title>
  <link th:href="@{/webjars/font-awesome/css/font-awesome.min.css}" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/resources/css/petclinic.css}" />

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark" role="navigation">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/}"><span></span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-navbar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="main-navbar" style>

      <ul class="navbar-nav me-auto mb-2 mb-lg-0" th:remove="all">

        <li th:fragment="menuItem (link,active,title,glyph,text)" th:class="nav-item">
          <a th:class="${active==menu ? 'nav-link active' : 'nav-link'}" th:href="@{__${link}__}" th:title="${title}">
            <span th:class="'fa fa-'+${glyph}" class="fa fa-home"></span>
            <span th:text="${text}">Template</span>
          </a>
        </li>

      </ul>

      <ul class="nav navbar-nav me-auto">

        <li th:replace="~{::menuItem ('/','home','home page','home',#{home})}">
          <span class="fa fa-home" aria-hidden="true"></span>
          <span th:text="#{home}">Home</span>
        </li>

        <li th:replace="~{::menuItem ('/schools','schools','find schools','search',#{findSchools})}">
          <span class="fa fa-search" aria-hidden="true"></span>
          <span th:text="#{findSchools}">Find schools</span>
        </li>

        <li th:replace="~{::menuItem ('/customers','customers','find customers','users',#{findCustomers})}">
          <span class="fa fa-users" aria-hidden="true"></span>
          <span th:text="#{findCustomers}">Find customers</span>
        </li>
        <!-- ADMIN ONLY - Pending Approvals -->
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a th:class="${menu == 'admin' ? 'nav-link active' : 'nav-link'}"
             th:href="@{/admin/pending-approvals}"
             title="Pending Approvals">
            <span class="fa fa-user-plus" aria-hidden="true"></span>
            <span>Pending Approvals</span>
          </a>
        </li>
        <li th:replace="~{::menuItem ('/pricing','pricing','Subscription pricing','trophy',#{pricingPage})}">
<!--          <a th:href="@{/subscriptions/new}" class="btn btn-primary" style="margin-bottom: 15px;">-->
          <span class="fa fa-trophy" aria-hidden="true"></span>
          <span th:text="#{pricingPage}">Pricing</span>
        </li>


        <!--          <li th:replace="~{::menuItem ('/owners/find','owners','find owners','search',#{findOwners})}">-->
<!--            <span class="fa fa-search" aria-hidden="true"></span>-->
<!--            <span th:text="#{findOwners}">Find owners</span>-->
<!--          </li>-->

<!--          <li th:replace="~{::menuItem ('/vets.html','vets','veterinarians','th-list',#{vets})}">-->
<!--            <span class="fa fa-th-list" aria-hidden="true"></span>-->
<!--            <span th:text="#{vets}">Veterinarians</span>-->
<!--          </li>-->

<!--          <li-->
<!--            th:replace="~{::menuItem ('/oups','error','trigger a RuntimeException to see how it is handled','exclamation-triangle',#{error})}">-->
<!--            <span class="fa exclamation-triangle" aria-hidden="true"></span>-->
<!--            <span th:text="#{error}">Error</span>-->
<!--          </li>-->

      </ul>

      <ul class="navbar-nav ms-auto">

        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link" th:href="@{/register}"
             th:classappend="${menu == 'register' ? 'active' : ''}">
            <span class="fa fa-user-plus"></span>
            <span th:text="#{register}">Register</span>
          </a>
        </li>

        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link" th:href="@{/login}"
             th:classappend="${menu == 'login' ? 'active' : ''}">
            <span class="fa fa-sign-in"></span>
            <span th:text="#{login}">Login</span>
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:href="@{/users/profile}"
             th:classappend="${menu == 'profile' ? 'active' : ''}">
            <span class="fa fa-user"></span>
            <span th:text="#{editProfile}">Edit Profile</span>
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <form th:action="@{/logout}" method="post" class="d-flex" style="height: 100%; margin: 0;">
            <button type="submit" class="nav-link btn btn-link"
                    style="border: none; background: transparent; cursor: pointer; display: flex; align-items: center;">
              <span class="fa fa-sign-out" style="margin-right: 5px;"></span>
              <span th:text="#{logout}">Logout</span>
            </button>
          </form>
        </li>

      </ul>


    </div>
  </div>
</nav>
<div class="container-fluid">
  <div class="container xd-container">

    <th:block th:insert="${template}" />

    <br />
    <br />
    <div class="container">
      <div class="row">
        <div class="col-12 text-center">
          <img src="../static/images/spring-logo.svg" th:src="@{/resources/images/spring-logo.svg}"
               alt="VMware Tanzu Logo" class="logo">
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/webjars/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>

</body>

</html>
