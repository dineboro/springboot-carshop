<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'appointments')}">
<body>

<h2>
  <span class="fa fa-bell"></span>
  <span th:text="${reminder.reminderId == null} ? 'Schedule Reminder' : 'Edit Reminder'">Reminder Form</span>
</h2>

<div class="mb-3">
  <a th:href="@{/appointments/{id}(id=${appointmentId})}" class="btn btn-sm btn-outline-secondary">
    <span class="fa fa-arrow-left"></span> Back to Appointment
  </a>
</div>

<form th:action="${reminder.reminderId == null}
        ? @{/appointments/{aId}/reminders/new(aId=${appointmentId})}
        : @{/appointments/{aId}/reminders/{rId}/edit(aId=${appointmentId},rId=${reminder.reminderId})}"
      th:object="${reminder}" method="post">

  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label fw-semibold">Reminder Type <span class="text-danger">*</span></label>
      <select class="form-select" th:field="*{reminderType}" required>
        <option value="">-- Select type --</option>
        <option th:each="t : ${reminderTypes}" th:value="${t}" th:text="${t}">Type</option>
      </select>
      <div class="text-danger small mt-1" th:if="${#fields.hasErrors('reminderType')}" th:errors="*{reminderType}">Error</div>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label fw-semibold">Scheduled Date/Time <span class="text-danger">*</span></label>
      <input type="datetime-local" class="form-control" th:field="*{scheduledDate}" />
      <div class="text-danger small mt-1" th:if="${#fields.hasErrors('scheduledDate')}" th:errors="*{scheduledDate}">Error</div>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label fw-semibold">Status</label>
      <select class="form-select" th:field="*{status}">
        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}">Status</option>
      </select>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Message (optional)</label>
    <textarea class="form-control" th:field="*{message}" rows="3"
              placeholder="Custom message to send with the reminder..."></textarea>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      <span class="fa fa-bell"></span>
      <span th:text="${reminder.reminderId == null} ? 'Schedule Reminder' : 'Save Changes'">Submit</span>
    </button>
    <a th:href="@{/appointments/{id}(id=${appointmentId})}" class="btn btn-secondary">
      <span class="fa fa-times"></span> Cancel
    </a>
  </div>

</form>

</body>
</html>
