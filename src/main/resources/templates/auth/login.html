<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'login')}">
<body>

<h2 class="text-center">Please Log In</h2>

<div class="container mt-4" style="max-width: 500px;">

  <!-- Error Messages -->
  <div th:if="${param.error}" class="alert alert-danger">
    <strong>Login Failed!</strong> Invalid email or password.
  </div>

  <div th:if="${param.disabled}" class="alert alert-warning">
    <strong>Account Pending!</strong> Your account is pending admin approval.
  </div>

  <div th:if="${param.logout}" class="alert alert-success">
    You have been logged out successfully.
  </div>

  <div th:if="${messageSuccess}" class="alert alert-success" th:text="${messageSuccess}"></div>

  <!-- Login Form - Spring Security uses 'username' and 'password' as field names -->
  <form th:action="@{/login}" method="post" class="form-horizontal">

    <!-- Email Field -->
    <div class="mb-3">
      <label for="username" class="form-label">Email</label>
      <div class="position-relative">
        <input type="email"
               id="username"
               name="username"
               class="form-control"
               placeholder="Enter your email"
               required
               autofocus>
      </div>
    </div>

    <!-- Password Field -->
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <div class="position-relative">
        <input type="password"
               id="password"
               name="password"
               class="form-control"
               placeholder="Enter your password"
               required>
      </div>
    </div>

    <!-- Submit Button -->
    <div class="d-grid gap-2 mt-4">
      <button type="submit" class="btn btn-primary">
        <span class="fa fa-sign-in"></span> Log In
      </button>
    </div>

    <!-- Register Link -->
    <div class="text-center mt-3">
      <p>Don't have an account? <a th:href="@{/register}">Register as Manager</a></p>
    </div>

  </form>
</div>

</body>
</html>
