<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'login')}">
<body>

<h2 class="text-center">Please Log In</h2>

<div class="container mt-4" style="max-width: 500px;">

  <!-- Error Messages -->
  <div th:if="${param.error}" class="alert alert-danger">
    <strong>Login Failed!</strong> Invalid email or password.
  </div>

  <div th:if="${param.disabled}" class="alert alert-warning">
    <strong>Account Pending!</strong> Your account is pending admin approval.
  </div>

  <div th:if="${param.logout}" class="alert alert-success">
    You have been logged out successfully.
  </div>

  <div th:if="${messageSuccess}" class="alert alert-success" th:text="${messageSuccess}"></div>

  <!-- Login Form - Instructor's version with ${user} model -->
  <form th:action="@{/login}" th:object="${user}" method="post" class="form-horizontal">

    <div th:replace="~{fragments/inputField :: input ('Email', 'email', 'text')}"></div>
    <div th:replace="~{fragments/inputField :: input ('Password', 'password', 'password')}"></div>

    <div class="d-grid gap-2 mt-4">
      <button type="submit" class="btn btn-primary">
        <span class="fa fa-sign-in"></span> Log In
      </button>
    </div>

    <!-- Single Register Link -->
    <div class="text-center mt-3">
      <p>Don't have an account? <a th:href="@{/register-student}">Register here</a></p>
    </div>

  </form>
</div>

</body>
</html>
