<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'service-catalog')}">
<body>

<h2>
  <span class="fa fa-list"></span>
  <span th:text="${serviceCatalog.catalogId == null} ? 'Add Service' : 'Edit Service'">Service Form</span>
</h2>

<form th:action="${serviceCatalog.catalogId == null} ? @{/service-catalog/new} : @{/service-catalog/{id}/edit(id=${serviceCatalog.catalogId})}"
      th:object="${serviceCatalog}" method="post">

  <div class="row">
    <div class="col-md-8 mb-3">
      <label class="form-label fw-semibold">Service Name <span class="text-danger">*</span></label>
      <input type="text" class="form-control" th:field="*{name}" maxlength="256" />
      <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</div>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label fw-semibold">Category</label>
      <select class="form-select" th:field="*{category}">
        <option value="">-- Select a category --</option>
        <option th:each="c : ${categories}" th:value="${c.name()}" th:text="${c.label}">Category</option>
      </select>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Description</label>
    <textarea class="form-control" th:field="*{description}" rows="3" maxlength="1024"></textarea>
  </div>

  <div class="row">
    <div class="col-md-3 mb-3">
      <label class="form-label fw-semibold">Base Price ($) <span class="text-danger">*</span></label>
      <input type="number" class="form-control" th:field="*{defaultPrice}" step="0.01" min="0" placeholder="0.00" />
    </div>
    <div class="col-md-3 mb-3">
      <label class="form-label fw-semibold">Est. Duration (hrs)</label>
      <input type="number" class="form-control" th:field="*{defaultLaborHours}" step="0.25" min="0" placeholder="0.00" />
    </div>
    <div class="col-md-3 mb-3">
      <label class="form-label fw-semibold">Labor Rate ($/hr)</label>
      <input type="number" class="form-control" th:field="*{laborRate}" step="0.01" min="0" placeholder="0.00" />
    </div>
    <div class="col-md-3 mb-3 d-flex align-items-end pb-2">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" th:field="*{active}" id="isActiveCheck" />
        <label class="form-check-label fw-semibold" for="isActiveCheck">Active</label>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      <span class="fa" th:classappend="${serviceCatalog.catalogId == null} ? 'fa-plus' : 'fa-save'"></span>
      <span th:text="${serviceCatalog.catalogId == null} ? 'Add Service' : 'Save Changes'">Submit</span>
    </button>
    <a href="/service-catalog" class="btn btn-secondary">
      <span class="fa fa-times"></span> Cancel
    </a>
  </div>

</form>

</body>
</html>
