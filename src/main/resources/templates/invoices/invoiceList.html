<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'invoices')}">
<body>

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2><span class="fa fa-file-text"></span> Invoices</h2>
  <a href="/invoices/new" class="btn btn-success">
    <span class="fa fa-plus"></span> New Invoice
  </a>
</div>

<div th:if="${messageSuccess}" class="alert alert-success alert-dismissible fade show">
  <span th:text="${messageSuccess}"></span>
  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<form th:action="@{/invoices}" method="get" class="mb-3">
  <div class="input-group" style="max-width: 400px;">
    <input type="text" name="search" class="form-control" placeholder="Search by customer name or phone"
           th:value="${search}">
    <button class="btn btn-outline-secondary" type="submit">
      <span class="fa fa-search"></span> Search
    </button>
    <a th:if="${search != null and search != ''}" th:href="@{/invoices}" class="btn btn-outline-danger">
      <span class="fa fa-times"></span>
    </a>
  </div>
</form>

<div th:if="${listInvoices != null and !listInvoices.empty}">
  <table class="table table-striped table-hover">
    <thead class="table-dark">
    <tr>
      <th>Invoice #</th>
      <th>Customer</th>
      <th>Vehicle</th>
      <th>Date</th>
      <th>Total</th>
      <th>Paid</th>
      <th>Balance</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="inv : ${listInvoices}">
      <td>
        <a th:href="@{/invoices/{id}(id=${inv.invoiceId})}" th:text="${inv.invoiceNumber}">INV-00001</a>
      </td>
      <td th:text="${inv.customer?.customerName ?: '—'}">Customer</td>
      <td th:text="${inv.vin}">VIN</td>
      <td th:text="${inv.invoiceDate != null ? #temporals.format(inv.invoiceDate, 'MMM d, yyyy') : '—'}">Jan 1</td>
      <td th:text="${'$' + #numbers.formatDecimal(inv.totalAmount, 1, 2)}">$0.00</td>
      <td th:text="${'$' + #numbers.formatDecimal(inv.amountPaid, 1, 2)}">$0.00</td>
      <td th:text="${'$' + #numbers.formatDecimal(inv.balance, 1, 2)}">$0.00</td>
      <td>
        <span class="badge"
              th:classappend="${inv.status.name() == 'Paid' ? 'bg-success' :
                              inv.status.name() == 'Void' ? 'bg-secondary' :
                              inv.status.name() == 'Partial' ? 'bg-warning text-dark' : 'bg-info text-dark'}"
              th:text="${inv.status}">Draft</span>
      </td>
      <td>
        <a class="btn btn-sm btn-outline-primary" th:href="@{/invoices/{id}(id=${inv.invoiceId})}">
          <span class="fa fa-eye"></span>
        </a>
        <a class="btn btn-sm btn-outline-secondary" th:href="@{/invoices/{id}/edit(id=${inv.invoiceId})}">
          <span class="fa fa-edit"></span>
        </a>
      </td>
    </tr>
    </tbody>
  </table>

  <nav th:if="${totalPages > 1}">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
        <a class="page-link" th:href="@{/invoices(page=${currentPage - 1}, search=${search})}">Previous</a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
          th:classappend="${i == currentPage} ? 'active'">
        <a class="page-link" th:href="@{/invoices(page=${i}, search=${search})}" th:text="${i}">1</a>
      </li>
      <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
        <a class="page-link" th:href="@{/invoices(page=${currentPage + 1}, search=${search})}">Next</a>
      </li>
    </ul>
  </nav>
</div>

<div th:if="${listInvoices == null or listInvoices.empty}" class="alert alert-info">
  <span class="fa fa-info-circle"></span> No invoices yet.
  <a th:href="@{/invoices/new}">Create one.</a>
</div>

</body>
</html>
