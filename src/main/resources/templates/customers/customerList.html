<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'customers')}">

<head>
  <meta charset="UTF-8">
  <title>Customers</title>
</head>

<body>

<h2>Customers</h2>

<table id="customersTable" class="table table-striped">
  <thead>
  <tr>
    <th style="width: 150px;">Customer Name</th>
    <th style="width: 120px;">Phone</th>
    <th style="width: 200px;">Email</th>
    <th style="width: 100px;">Status</th>
    <th style="width: 80px;">Vehicles</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="customer : ${listCustomers}">
    <td>
      <a th:href="@{/customers/{id}(id=${customer.customerId})}"
         th:text="${customer.customerName}">Customer Name</a>
    </td>
    <td th:text="${customer.phone}">555-1234</td>
    <td th:text="${customer.email != null ? customer.email : 'N/A'}">email@example.com</td>
    <td>
      <span class="badge badge-success" th:text="${customer.status}">ACTIVE</span>
    </td>
    <td th:text="${customer.vehicles.size()}">0</td>
  </tr>
  </tbody>
</table>

<!-- Pagination controls -->
<div class="row" th:if="${totalPages > 1}">
  <div class="col-sm-12">
    <nav aria-label="Page navigation">
      <ul class="pagination justify-content-center">
        <!-- First page -->
        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
          <a class="page-link" th:href="@{/customers(page=1)}">First</a>
        </li>

        <!-- Previous page -->
        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
          <a class="page-link" th:href="@{/customers(page=${currentPage - 1})}">Previous</a>
        </li>

        <!-- Current page indicator -->
        <li class="page-item active">
          <span class="page-link" th:text="${currentPage}">1</span>
        </li>

        <!-- Next page -->
        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
          <a class="page-link" th:href="@{/customers(page=${currentPage + 1})}">Next</a>
        </li>

        <!-- Last page -->
        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
          <a class="page-link" th:href="@{/customers(page=${totalPages})}">Last</a>
        </li>
      </ul>
    </nav>
  </div>
</div>

<!-- Pagination info -->
<div class="row">
  <div class="col-sm-12 text-center">
    <p class="text-muted">
      Page <strong th:text="${currentPage}">1</strong> of <strong th:text="${totalPages}">10</strong>
      (Total: <span th:text="${totalItems}">50</span> customers)
    </p>
  </div>
</div>

<!-- Action buttons -->
<div class="row">
  <div class="col-sm-12">
    <a class="btn btn-primary" th:href="@{/customers/new}">
      <span class="fa fa-plus"></span> Add Customer
    </a>
    <a class="btn btn-secondary" th:href="@{/customers/find}">
      <span class="fa fa-search"></span> Search Customers
    </a>
  </div>
</div>

</body>
</html>
