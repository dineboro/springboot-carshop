<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'customers')}">

<head>
  <meta charset="UTF-8">
  <title th:text="#{customers}">Customers</title>
</head>

<body>

<h2 th:text="#{customers}">Customers</h2>

<table id="customersTable" class="table table-striped">
  <thead>
  <tr>
    <th style="width: 150px;" th:text="#{label.customer.name}">Customer Name</th>
    <th style="width: 120px;" th:text="#{label.customer.phone}">Phone</th>
    <th style="width: 200px;" th:text="#{label.customer.email}">Email</th>
    <th style="width: 100px;" th:text="#{status}">Status</th>
    <th style="width: 80px;" th:text="#{vehicles}">Vehicles</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="customer : ${listCustomers}">
    <td>
      <a th:href="@{/customers/{id}(id=${customer.customerId})}"
         th:text="${customer.customerName}">Customer Name</a>
    </td>
    <td th:text="${customer.phone}">555-1234</td>
    <td th:text="${customer.email != null ? customer.email : 'N/A'}"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="593c34383035193c21383429353c773a3634">[email&#160;protected]</a></td>
    <td>
      <span class="badge badge-success" th:text="${customer.status}">ACTIVE</span>
    </td>
    <td th:text="${customer.vehicles.size()}">0</td>
  </tr>
  </tbody>
</table>

<!-- Pagination controls -->
<div class="row" th:if="${totalPages > 1}">
  <div class="col-sm-12">
    <nav aria-label="Page navigation">
      <ul class="pagination justify-content-center">
        <!-- First page -->
        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
          <a class="page-link" th:href="@{/customers(page=1)}" th:text="#{first}">First</a>
        </li>

        <!-- Previous page -->
        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
          <a class="page-link" th:href="@{/customers(page=${currentPage - 1})}" th:text="#{previous}">Previous</a>
        </li>

        <!-- Current page indicator -->
        <li class="page-item active">
          <span class="page-link" th:text="${currentPage}">1</span>
        </li>

        <!-- Next page -->
        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
          <a class="page-link" th:href="@{/customers(page=${currentPage + 1})}" th:text="#{next}">Next</a>
        </li>

        <!-- Last page -->
        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
          <a class="page-link" th:href="@{/customers(page=${totalPages})}" th:text="#{last}">Last</a>
        </li>
      </ul>
    </nav>
  </div>
</div>

<!-- Pagination info -->
<div class="row">
  <div class="col-sm-12 text-center">
    <p class="text-muted">
      <span th:text="#{pages}">Page</span>: <strong th:text="${currentPage}">1</strong> / <strong th:text="${totalPages}">10</strong>
      (<span th:text="#{total}">Total</span>: <span th:text="${totalItems}">50</span> <span th:text="#{customers}">customers</span>)
    </p>
  </div>
</div>

<!-- Action buttons -->
<div class="row">
  <div class="col-sm-12 d-flex align-items-center gap-4">
    <a class="btn btn-primary mt-0" th:href="@{/customers/new}">
      <span class="fa fa-plus"></span> <span th:text="#{addCustomer}">Add Customer</span>
    </a>
    <a class="btn btn-secondary" th:href="@{/customers/find}">
      <span class="fa fa-search"></span> <span th:text="#{findCustomers}">Search Customers</span>
    </a>
  </div>
</div>

</body>
</html>
